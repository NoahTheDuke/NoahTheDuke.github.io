{% extends "/html/base.html" %}
{% block subtitle %}: Archives{% endblock %}
{% block content %}
<div id="posts">
    <div id="page-header">
        <h1>Blog Posts</h1>
    </div>
    <a href="/p/1">View posts with previews</a>
    <ul>
    {% for group in groups %}
    {% for post in group.posts %}
    <li>{{post.date|date:"yyyy-MM-dd"}} - <a href="{{post.uri}}">{{post.title}}</a></li>
    {% endfor %}
    {% endfor %}
    </ul>

</div>
{% endblock %}
